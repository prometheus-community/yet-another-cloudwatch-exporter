apiVersion: v1alpha1
sts-region: us-east-1
discovery:
  exportedTagsOnMetrics:
    AWS/EC2:
      - Name
  jobs:
    - regions:
        - us-east-1
      type: AWS/EC2
      metrics:
        - name: CPUUtilization
          statistics:
            - Average
          period: 300
          length: 300
