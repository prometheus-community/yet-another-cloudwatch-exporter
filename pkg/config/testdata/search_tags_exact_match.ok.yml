apiVersion: v1alpha1
discovery:
  jobs:
    - type: AWS/EC2
      regions:
        - us-east-1
      searchTags:
        - key: Environment
          value: production
          exactMatch: true
        - key: Team
          value: "platform-.*"
      metrics:
        - name: CPUUtilization
          statistics:
            - Average
          period: 300
          length: 300
